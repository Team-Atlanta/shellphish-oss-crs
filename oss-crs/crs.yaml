name: crs-shellphish-quickseed
type:
  - bug-finding
version: 1.0.0
docker_registry: local

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  # Java canonical build (debug artifacts + code-swipe input)
  - name: java-canonical-build
    dockerfile: shellphish-src/libs/crs-utils/src/shellphish_crs_utils/oss_fuzz/instrumentation/jazzer/Dockerfile.builder
    outputs:
      - build-canonical
    additional_env:
      FUZZING_ENGINE: libfuzzer
      FUZZING_LANGUAGE: jvm
      BUILD_OUTPUT_NAME: build-canonical

  # Java coverage build (QuickSeed coverage tracing via JaCoCo)
  - name: java-coverage-build
    dockerfile: shellphish-src/libs/crs-utils/src/shellphish_crs_utils/oss_fuzz/instrumentation/coverage_fast/Dockerfile.builder.jvm
    outputs:
      - build-coverage
    additional_env:
      FUZZING_ENGINE: libfuzzer
      FUZZING_LANGUAGE: jvm
      SANITIZER: coverage
      BUILD_OUTPUT_NAME: build-coverage

  # Jazzer build (for fuzzing)
  - name: jazzer-build
    dockerfile: shellphish-src/libs/crs-utils/src/shellphish_crs_utils/oss_fuzz/instrumentation/jazzer/Dockerfile.builder
    outputs:
      - build-jazzer
    additional_env:
      FUZZING_ENGINE: libfuzzer
      FUZZING_LANGUAGE: jvm
      BUILD_OUTPUT_NAME: build-jazzer

  # CodeQL database
  - name: codeql-build
    dockerfile: shellphish-src/libs/crs-utils/src/shellphish_crs_utils/oss_fuzz/instrumentation/codeql/Dockerfile.builder
    outputs:
      - codeql-db
    additional_env:
      BUILD_OUTPUT_NAME: codeql-db

  # Metadata chain
  - name: target-identifier
    dockerfile: shellphish-src/components/target-identifier/Dockerfile
    outputs:
      - augmented-metadata
    additional_env:
      BUILD_OUTPUT_NAME: augmented-metadata
  - name: config-splitter
    dockerfile: shellphish-src/components/configuration-splitter/Dockerfile
    outputs:
      - split-metadata
    additional_env:
      BUILD_OUTPUT_NAME: split-metadata

  # Java function indexing (antlr4-guy replaces clang-indexer for Java)
  - name: antlr4-func-index
    dockerfile: shellphish-src/components/antlr4-guy/Dockerfile
    outputs:
      - func-index
    additional_env:
      BUILD_OUTPUT_NAME: func-index

  # Semgrep analysis
  - name: semgrep-analysis
    dockerfile: shellphish-src/components/semgrep/Dockerfile
    outputs:
      - semgrep-report
    additional_env:
      BUILD_OUTPUT_NAME: semgrep-report
      FUZZING_LANGUAGE: jvm

  # CodeQL analysis (CWE queries + DB zip for codeql-server)
  - name: codeql-analysis
    dockerfile: shellphish-src/components/codeql/Dockerfile
    outputs:
      - codeql-analysis
    additional_env:
      BUILD_OUTPUT_NAME: codeql-analysis
      FUZZING_LANGUAGE: jvm

  # Code-swipe function ranking
  - name: code-swipe
    dockerfile: shellphish-src/components/code-swipe/Dockerfile
    outputs:
      - code-swipe-ranking
    additional_env:
      BUILD_OUTPUT_NAME: code-swipe-ranking
      FUZZING_LANGUAGE: jvm

crs_run_phase:
  entrypoint:
    dockerfile: oss-crs-entrypoint/Dockerfile
    additional_env:
      CRS_PIPELINE_MODE: quickseed
  neo4j:
    dockerfile: neo4j/Dockerfile
  codeql-server:
    dockerfile: shellphish-src/services/codeql_server/Dockerfile
    additional_env:
      FUZZING_LANGUAGE: "jvm"
  ag-init:
    dockerfile: shellphish-src/components/codeql/Dockerfile.ag-init-run
    additional_env:
      ANALYSIS_GRAPH_BOLT_URL: "bolt://neo4j:helloworldpdt@neo4j.crs-shellphish-quickseed:7687"
      CODEQL_SERVER_URL: "http://codeql-server.crs-shellphish-quickseed:4000"
      FUZZING_LANGUAGE: "jvm"
  jazzer_fuzzer:
    dockerfile: shellphish-src/libs/crs-utils/src/shellphish_crs_utils/oss_fuzz/instrumentation/jazzer/Dockerfile.runner
  quickseed:
    dockerfile: shellphish-src/components/quickseed/Dockerfile
    additional_env:
      ANALYSIS_GRAPH_BOLT_URL: "bolt://neo4j:helloworldpdt@neo4j.crs-shellphish-quickseed:7687"
      CODEQL_SERVER_URL: "http://codeql-server.crs-shellphish-quickseed:4000"
      QUICKSEED_LLM_MODEL: "claude-sonnet-4-6,o4-mini"
      LOCAL_RUN: "True"

supported_target:
  mode:
    - full
    - delta
  language:
    - jvm
  sanitizer:
    - address
  architecture:
    - x86_64
